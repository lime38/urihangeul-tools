<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>초성 추출기 — 우리한글 도구</title>
<meta name="description" content="한글 텍스트에서 각 글자의 초성만 빠르게 추출하는 무료 온라인 도구. 초성 검색어, 초성 퀴즈, 색인 생성에 사용.">
<link rel="canonical" href="https://urihangeul.com/chosung-extractor/">
<link rel="stylesheet" href="../shared/style.css">
<style>
.tool .opts{background:#2e2e2e;padding:14px 16px;border-radius:8px;margin:12px 0}
.tool .opts label{display:flex;align-items:center;gap:6px;color:#ddd;margin:4px 0}
.tool .result-wrap{margin-top:14px}
.tool .result-label{color:#9cf;font-weight:700;margin-bottom:6px}
.tool .result{background:#1e1e1e;border:1px solid #444;border-radius:8px;padding:14px;min-height:80px;color:#eee;word-break:break-all;font-size:18px;letter-spacing:1px}
</style>
</head>
<body>
<h2>초성 추출기</h2>
<p>한글 텍스트의 각 음절에서 초성만 추출합니다. '우리한글' → 'ㅇㄹㅎㄱ' 형태. 초성 검색어, 초성 퀴즈, 색인 생성에 사용.</p>
<div class="tool">
  <textarea style="resize:none;min-height:250px;" id="inp" placeholder="텍스트를 입력해 보세요."></textarea>
  <div class="opts">
    <label><input type="checkbox" id="keep_space" checked> 공백 유지</label>
    <label><input type="checkbox" id="keep_other" checked> 숫자·영문 유지</label>
  </div>
  <div class="btns">
    <button onclick="runExtract()">추출</button>
    <button class="sec" id="copy_btn" onclick="runCopy()">복사</button>
    <button class="sec" onclick="runClear()">초기화</button>
  </div>
  <div class="result-wrap">
    <div class="result-label">추출 결과</div>
    <div class="result" id="out">추출 결과가 여기에 표시됩니다.</div>
  </div>
</div>
<p style="margin-top:24px;color:#888;font-size:14px">
  웹에서 바로 사용하기: <a href="https://urihangeul.com/chosung-extractor/" style="color:#9cf">우리한글 — 초성 추출기</a>
</p>
<script>
/*
 * 우리한글 — 초성 추출기 (https://urihangeul.com/chosung-extractor/)
 * License: MIT
 */
const CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function getCho(ch){
  const code = ch.charCodeAt(0);
  if (code < 0xAC00 || code > 0xD7A3) return null;
  return CHO[Math.floor((code - 0xAC00) / 28 / 21)];
}
function runExtract(){
  const t = document.getElementById('inp').value;
  if (!t.trim()) {
    document.getElementById('out').textContent = '텍스트를 입력해 주세요.';
    return;
  }
  const keepSpace = document.getElementById('keep_space').checked;
  const keepOther = document.getElementById('keep_other').checked;
  let result = '';
  for (const ch of t) {
    const cho = getCho(ch);
    if (cho) { result += cho; }
    else if (ch === ' ' || ch === '\n') { if (keepSpace) result += ch; }
    else { if (keepOther) result += ch; }
  }
  document.getElementById('out').textContent = result || '(결과 없음)';
}
function runCopy(){
  const val = document.getElementById('out').textContent;
  if (!val) return;
  const el = document.createElement('textarea');
  el.value = val; el.style.position = 'fixed'; el.style.opacity = '0';
  document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
  const btn = document.getElementById('copy_btn');
  btn.textContent = '복사 완료!';
  setTimeout(() => { btn.textContent = '복사'; }, 1500);
}
function runClear(){
  document.getElementById('inp').value = '';
  document.getElementById('out').textContent = '추출 결과가 여기에 표시됩니다.';
}
</script>
</body>
</html>
