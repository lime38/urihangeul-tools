<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글자 반복 제거기 — 우리한글 도구</title>
<meta name="description" content="'ㅋㅋㅋㅋ' → 'ㅋ'처럼 과하게 반복된 글자를 지정한 횟수 이하로 줄이는 무료 온라인 도구. SNS·댓글·채팅 데이터 정제에 사용.">
<link rel="canonical" href="https://urihangeul.com/character-repeat-remover/">
<link rel="stylesheet" href="../shared/style.css">
<style>
.tool .opts{background:#2e2e2e;padding:14px 16px 14px 30px;border-radius:8px;flex-direction:column;gap:8px}
.tool .threshold input[type=number]{width:52px;padding:5px 8px}
</style>
</head>
<body>
<h2>글자 반복 제거기</h2>
<p>'ㅋㅋㅋㅋ' → 'ㅋ' 하나로, '오오오오오' → '오'처럼 과하게 반복된 글자를 지정한 최대 횟수 이하로 줄여줍니다. SNS 게시글·카톡·댓글 데이터 정제에 씁니다.</p>
<div class="tool">
  <textarea id="inp" placeholder="정리할 문구를 입력해 보세요." style="resize:none;min-height:250px"></textarea>
  <div class="opts">
    <div class="opts-title">반복 기준</div>
    <div class="threshold"><input type="number" id="max_rep" value="1" min="1" max="9"> 개 초과 시 축소</div>
    <div class="divider"></div>
    <div class="opts-title">옵션</div>
    <p>
      <label><input type="checkbox" id="keep_double" checked> 2회 반복은 유지 (ㅋㅋ, ㅠㅠ 등)</label>
      <label><input type="checkbox" id="jamo_only"> 자모(ㄱ/ㅇ/ㅋ/ㅎ/ㅠ 등)만 처리</label>
    </p>
  </div>
  <div class="btns">
    <button onclick="runClean()">정리</button>
    <button class="sec" id="copy_btn" onclick="runCopy()">복사</button>
    <button class="sec" onclick="runClear()">초기화</button>
  </div>
  <div class="out-wrap">
    <div class="out-label">정리 결과</div>
    <textarea id="out" placeholder="정리 결과가 여기에 표시됩니다." readonly style="resize:none;min-height:250px"></textarea>
  </div>
</div>
<p style="margin-top:24px;color:#888;font-size:14px">
  웹에서 바로 사용하기: <a href="https://urihangeul.com/character-repeat-remover/" style="color:#9cf">우리한글 — 글자 반복 제거기</a>
</p>
<script>
/*
 * 우리한글 — 글자 반복 제거기 (https://urihangeul.com/character-repeat-remover/)
 * License: MIT
 */
function isJamo(ch){
  const c=ch.charCodeAt(0);
  return (c>=0x3131&&c<=0x314E)||(c>=0x314F&&c<=0x3163);
}
function runClean(){
  const inp=document.getElementById('inp');
  const out=document.getElementById('out');
  const t=inp.value;
  if(!t.trim()){out.value='텍스트를 입력해 주세요.';return;}
  const keepDouble=document.getElementById('keep_double').checked;
  const jamoOnly=document.getElementById('jamo_only').checked;
  const maxRep=Math.max(1,parseInt(document.getElementById('max_rep').value)||1);
  const limit=keepDouble?Math.max(maxRep,2):maxRep;
  let result='';
  let i=0;
  while(i<t.length){
    const ch=t[i];
    if(jamoOnly&&!isJamo(ch)){result+=ch;i++;continue;}
    let cnt=1;
    while(i+cnt<t.length&&t[i+cnt]===ch)cnt++;
    result+=ch.repeat(cnt>limit?limit:cnt);
    i+=cnt;
  }
  out.value=result;
}
function runCopy(){
  const val=document.getElementById('out').value;
  if(!val)return;
  const el=document.createElement('textarea');
  el.value=val;
  el.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(el);
  el.select();
  document.execCommand('copy');
  document.body.removeChild(el);
  const btn=document.getElementById('copy_btn');
  btn.textContent='복사 완료!';
  setTimeout(()=>{btn.textContent='복사';},1500);
}
function runClear(){
  document.getElementById('inp').value='';
  document.getElementById('out').value='';
}
</script>
</body>
</html>
