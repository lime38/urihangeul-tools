<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글자 수 세기 — 우리한글 도구</title>
<meta name="description" content="텍스트의 글자 수(공백 포함/제외), 어절 수, 문장 수, 단락 수를 한 번에 분석하는 무료 온라인 도구.">
<link rel="canonical" href="https://urihangeul.com/word-counter/">
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<h2>글자 수 세기</h2>
<p>글자 수(공백 포함·제외), 어절 수, 문장 수, 단락 수를 한 번에 확인합니다.</p>
<div class="tool">
  <textarea style="resize:none;min-height:250px;" id="inp" placeholder="정리할 문구를 입력해 보세요." oninput="doCount()"></textarea>
  <div class="btns">
    <button onclick="copyText()">문구 복사</button>
    <button class="sec" onclick="document.getElementById('inp').value='';doCount()">초기화</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="num" id="chars">0</div><div class="label">글자 수 (공백 포함)</div></div>
    <div class="stat"><div class="num" id="chars_no">0</div><div class="label">글자 수 (공백 제외)</div></div>
    <div class="stat"><div class="num" id="words">0</div><div class="label">어절 수</div></div>
  </div>
  <div class="stat2">
    <div class="stat"><div class="num" id="sents">0</div><div class="label">문장 수</div></div>
    <div class="stat"><div class="num" id="paras">0</div><div class="label">단락 수</div></div>
  </div>
</div>
<p style="margin-top:24px;color:#888;font-size:14px">
  웹에서 바로 사용하기: <a href="https://urihangeul.com/word-counter/" style="color:#9cf">우리한글 — 글자 수 세기</a><br>
  더 정밀한 한글 교정: <a href="https://urihangeul.com" style="color:#9cf">우리한글 프로</a>
</p>
<script data-cfasync="false">
/*
 * 우리한글 — 글자 수 세기 (https://urihangeul.com/word-counter/)
 * License: MIT
 */
function copyText(){ const t=document.getElementById('inp').value; if(t.trim()===''){return;} navigator.clipboard.writeText(t).then(function(){ var b=document.querySelector('.btns button'); var orig=b.textContent; b.textContent='복사 완료!'; setTimeout(function(){b.textContent=orig;},1500); }); }
function doCount(){ const t=document.getElementById('inp').value; document.getElementById('chars').textContent=t.length; document.getElementById('chars_no').textContent=t.replace(/\s/g,'').length; const words=t.trim()===''?0:t.trim().split(/\s+/).length; document.getElementById('words').textContent=words; const sents=t.trim()===''?0:t.trim().split(/[.!?…\n]+/).filter(function(s){return s.trim()!=='';}).length; document.getElementById('sents').textContent=sents; const paras=t.trim()===''?0:t.trim().split(/\n\s*\n+/).length; document.getElementById('paras').textContent=paras; }
doCount();
</script>
</body>
</html>
